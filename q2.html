<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記録・２を解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>解析中...</h1>
<p>データを取得しています…</p>
<progress id="bar" value="0" max="100" style="width:80%; height:30px;"></progress>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });
let progress = 0;
let interval = setInterval(() => {
  progress++;
  document.getElementById("bar").value = progress;

  if (progress >= 100) {
    clearInterval(interval);
  }
}, 100);

// 30秒後に結果表示
setTimeout(() => {
document.getElementById("result").innerHTML =
"【記録2】<br><br>" +
"……奇妙なことに気付いた。<br>" +
"奴は暗闇には現れるが、灯りのある場所には近付こうとしない。<br><br>" +
"廊下の電灯を点けた瞬間、あの気配が消えた。<br>" +
"やはり“光”を嫌っているのかもしれない。<br><br>" +
"もしそうなら、この部屋の電源が落ちている理由も説明がつく。<br>" +
"誰かが意図的に暗くしている……？<br><br>" +
"次の数字は<span style='color:red;'>7</span>。<br>" +
"灯りを絶やすな。それだけが、奴から逃れる術だ。";
}, 10000);
</script>

</body>
</html>
