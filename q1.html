<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>解析中...</h1>
<p>データを取得しています…</p>
<progress id="bar" value="0" max="100" style="width:80%; height:30px;"></progress>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });
let progress = 0;
let interval = setInterval(() => {
  progress++;
  document.getElementById("bar").value = progress;

  if (progress >= 100) {
    clearInterval(interval);
  }
}, 300);

// 60秒後に結果表示
setTimeout(() => {
  document.getElementById("result").innerHTML = document.getElementById("result").innerHTML =
"【記録1】<br><br>" +
"……何度も聞こえる。壁の向こうから、床を擦るような音が。<br>" +
"最初は気のせいだと思っていたが、違う。あれは“音”に反応している。<br><br>" +
"試しに物を落とした瞬間、明らかにこちらへ向かってきた。<br>" +
"奴は、音に敏感だ。少しの物音でも気付かれる。<br><br>" +
"……だからこそ、気付いた。<br>" +
"この施設に残された数字も、“何か意味がある”のかもしれない。<br><br>" +
"最初の数字は<span style='color:red;'>7</span>。<br>" +
"これ以上音を立てるな。奴は、すぐそこにいる。";
}, 30000);
</script>

</body>
</html>
