<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>解析中...</h1>
<p>データを取得しています…</p>
<progress id="bar" value="0" max="100" style="width:80%; height:30px;"></progress>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });
let progress = 0;
let interval = setInterval(() => {
  progress++;
  document.getElementById("bar").value = progress;

  if (progress >= 100) {
    clearInterval(interval);
  }
}, 300);

// 60秒後に結果表示
setTimeout(() => {
  document.getElementById("result").innerHTML = "これを見つけた君は運がいい。<br>暗闇の中で初めてアレを見たとき<br>奴は音に敏感だと分かった...<br><br><br>俺は<span style='color:red;'>一</span>日千秋の思いで息を殺してやり過ごした。";
}, 30000);
</script>

</body>
</html>
