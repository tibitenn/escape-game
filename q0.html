<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記録・0を解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>非登録者の手記0を解析中...</h1>
<p>データを取得しています…</p>
<progress id="bar" value="0" max="100" style="width:80%; height:30px;"></progress>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });
let progress = 0;
let interval = setInterval(() => {
  progress++;
  document.getElementById("bar").value = progress;

  if (progress >= 100) {
    clearInterval(interval);
  }
}, 100);

// 60秒後に結果表示
setTimeout(() => {
document.getElementById("result").innerHTML =
"【非登録者の手記０】<br><br>" +
"○月○日<br><br>" +
"……状況がよく分からない。<br>" +
"気がついたら、この見覚えのない施設の中にいた。<br><br>" +

"とりあえず周囲を調べてみたが、人の気配はない。<br>" +
"ただ、机の上に置かれていた書類だけが妙に気になった。<br><br>" +

"その中に、ひとつだけ強く印象に残る数字があった。<br>" +
"ロッカーの識別番号らしい。<br><br>" +

"<span style='color:red;'>131</span><br><br>" +

"意味は分からないが、ここで見つけた情報だ。<br>" +
"無視するわけにはいかない。<br><br>" +

"……それにしても、妙だ。<br>" +
"さっきから、奥の方から嫌な気配がする。<br>" +
"何かがいるような、そんな感覚だ。<br><br>" +

"静かにしていた方がいい。<br>" +
"理由は分からないが……音を立てるのは危険な気がする。<br><br>" +

"もう少し、この場所を調べてみる。";
}, 10000);
</script>

</body>
</html>
