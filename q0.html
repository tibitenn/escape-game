<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>解析中...</h1>
<p>データを取得しています…</p>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });

// 60秒後に結果表示
setTimeout(() => {
  document.getElementById("result").innerHTML = "数字：3";
}, 60000);
</script>

</body>
</html>
