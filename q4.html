<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>解析中...</title>

<style>
body {
  background-color: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>解析中...</h1>
<p>データを取得しています…</p>
<progress id="bar" value="0" max="100" style="width:80%; height:30px;"></progress>

<p id="result"></p>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 音鳴らす（※最初タップ必要な場合あり）
document.body.addEventListener("click", () => {
  document.getElementById("sound").play();
}, { once: true });
let progress = 0;
let interval = setInterval(() => {
  progress++;
  document.getElementById("bar").value = progress;

  if (progress >= 100) {
    clearInterval(interval);
  }
}, 100);

// 30秒後に結果表示
setTimeout(() => {
document.getElementById("result").innerHTML =
"【記録4】<br><br>" +
"……もう時間がない。<br>" +
"奴は確実にこちらへ近づいている。<br><br>" +
"ここまでの記録を繋げれば分かるはずだ。<br>" +
"音を立てるな。光を絶やすな。そして、順番を間違えるな。<br><br>" +
"この施設にはまだ“何か”が残されている。<br>" +
"だが、それを開くには“正しい並び”が必要だ。<br><br>" +
"最後の数字は<span style='color:red;'>1</span>。<br><br>" +
"……振り返るな。もう、すぐ後ろにいる。";
}, 10000);
</script>

</body>
</html>
